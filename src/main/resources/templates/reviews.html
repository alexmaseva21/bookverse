<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BookVerse - Write Review</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <div th:replace="~{fragments/layout :: head}"></div>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="row w-100 shadow-lg rounded-4 overflow-hidden card-custom mx-auto" style="max-width: 950px; background: white;">

        <div class="col-md-5 d-none d-md-flex flex-column justify-content-center align-items-center text-white p-5 text-center"
             style="background: linear-gradient(135deg, #4C1D95 0%, #3B0764 100%);">
            <img src="/images/purplebooks.avif" alt="Purple Books" class="img-fluid mb-4 rounded-3 shadow-sm" style="max-height: 200px;">
            <h4 class="fw-bold text-glow">Why Your Review Matters</h4>
            <div class="text-start small opacity-90 mt-3 px-2">
                <p>⭐ <strong>Rate carefully:</strong> Be honest with your stars.</p>
                <p>📝 <strong>Add depth:</strong> Mention your favorite plots or characters.</p>
                <p>🔮 <strong>Inspire:</strong> Help other book lovers find their next world.</p>
            </div>
        </div>

        <div class="col-md-7 p-4 p-sm-5 d-flex flex-column justify-content-center">
            <h2 class="fw-bold mb-2" style="color: #4C1D95;">Your Thoughts</h2>
            <p class="text-muted small mb-4">Share your impressions on what you read.</p>

            <form th:action="@{/reviews/new}" th:object="${reviewDTO}" method="POST">

                <div class="mb-3">
                    <label for="stars" class="form-label fw-semibold small">Rating (1 - 5 Stars)</label>
                    <select th:field="*{stars}" class="form-select py-2" id="stars" required>
                        <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
                        <option value="4">⭐⭐⭐⭐ (Very Good)</option>
                        <option value="3">⭐⭐⭐ (Average)</option>
                        <option value="2">⭐⭐ (Dislikable)</option>
                        <option value="1">⭐ (Terrible)</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="content" class="form-label fw-semibold small">Detailed Review</label>
                    <textarea th:field="*{content}" class="form-control" id="content" rows="5" placeholder="Write your detailed review here. Mention characters, themes, and your overall impressions..." required></textarea>
                </div>

                <div class="form-check form-switch mb-4">
                    <input th:field="*{private}" class="form-check-input" type="checkbox" id="isPrivate">
                    <label class="form-check-label small fw-semibold text-muted" for="isPrivate">Make this review private (only you can see it)</label>
                </div>

                <button type="submit" class="btn btn-purple w-100 fw-bold py-2 shadow-sm">Submit Review ✨</button>
            </form>
        </div>

    </div>
</div>

</body>
</html>
