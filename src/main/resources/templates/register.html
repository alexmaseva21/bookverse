<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BookVerse - Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <div th:replace="~{fragments/layout :: head}"></div>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="row w-100 shadow-lg rounded-4 overflow-hidden card-custom mx-auto" style="max-width: 900px; background: white;">

        <div class="col-md-5 d-none d-md-flex flex-column justify-content-center align-items-center text-white p-5 text-center"
             style="background: linear-gradient(135deg, #4C1D95 0%, #6D28D9 100%);">
            <div class="mb-3" style="font-size: 5rem;">📚✨</div>
            <h3 class="fw-bold text-light-violet">Join BookVerse</h3>
            <p class="small opacity-75">Step into a cosmos built for readers. Track shelves, write down reviews, and challenge your goals.</p>
        </div>

        <div class="col-md-7 p-4 p-sm-5 d-flex flex-column justify-content-center">
            <h2 class="fw-bold mb-3" style="color: #4C1D95;">Create Account</h2>
            <p class="text-muted small mb-4">Please fill out your details below to get started.</p>

            <form th:action="@{/users/register}" th:object="${registerDTO}" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold small">Username</label>
                    <input th:field="*{username}" type="text" class="form-control py-2" id="username" placeholder="Choose a username" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold small">Email Address</label>
                    <input th:field="*{email}" type="email" class="form-control py-2" id="email" placeholder="name@example.com" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold small">Password</label>
                    <input th:field="*{password}" type="password" class="form-control py-2" id="password" placeholder="Min 3 characters" required>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label fw-semibold small">Confirm Password</label>
                    <input th:field="*{confirmPassword}" type="password" class="form-control py-2" id="confirmPassword" placeholder="Repeat your password" required>
                </div>

                <button type="submit" class="btn btn-purple w-100 fw-bold py-2 shadow-sm">Sign Up</button>
            </form>

            <div class="text-center mt-4">
                <small class="text-muted">Already have an account? <a href="/users/login" style="color: #6D28D9;" class="fw-semibold text-decoration-none">Log in here</a></small>
            </div>
        </div>

    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
