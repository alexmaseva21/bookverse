<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BookVerse - Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <div th:replace="~{fragments/layout :: head}"></div>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="row w-100 shadow-lg rounded-4 overflow-hidden card-custom mx-auto" style="max-width: 900px; background: white;">

        <div class="col-md-5 d-none d-md-flex flex-column justify-content-center align-items-center text-white p-5 text-center"
             style="background: linear-gradient(135deg, #4C1D95 0%, #6D28D9 100%);">
            <div class="mb-3" style="font-size: 5rem;">🔮📖</div>
            <h3 class="fw-bold text-light-violet">Welcome Back!</h3>
            <p class="small opacity-75">Log in to open your private shelves, view active challenges, and sync your reading logs.</p>
        </div>

        <div class="col-md-7 p-4 p-sm-5 d-flex flex-column justify-content-center">
            <h2 class="fw-bold mb-3" style="color: #4C1C95;">Account Login</h2>
            <p class="text-muted small mb-4">Please enter your username and password.</p>

            <form th:action="@{/users/login}" th:object="${loginDTO}" method="POST">

                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold small">Username</label>
                    <input th:field="*{username}" type="text" class="form-control py-2" id="username" placeholder="Enter username">
                    <small class="text-danger fw-semibold d-block mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></small>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold small">Password</label>
                    <input th:field="*{password}" type="password" class="form-control py-2" id="password" placeholder="Enter password">
                    <small class="text-danger fw-semibold d-block mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
                </div>

                <button type="submit" class="btn btn-purple w-100 fw-bold py-2 shadow-sm">Log In</button>
            </form>

            <div class="text-center mt-4">
                <small class="text-muted">Don't have an account? <a href="/users/register" style="color: #6D28D9;" class="fw-semibold text-decoration-none">Register here</a></small>
            </div>
        </div>

    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
