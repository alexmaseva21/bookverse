<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <title>BookVerse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-violet: #6f42c1;
            --dark-violet: #4c2885;
            --light-violet: #f3eefb;
            --accent-pink: #d63384;
        }
        body {
            background-color: #fdfbfe;
        }
        .bg-violet {
            background-color: var(--primary-violet) !important;
        }
        .btn-violet {
            background-color: var(--primary-violet);
            color: white;
        }
        .btn-violet:hover {
            background-color: var(--dark-violet);
            color: white;
        }
        .text-violet {
            color: var(--primary-violet);
        }
        /* Server-side validation error styles */
        .validation-error {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-violet shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">🔮 BookVerse</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#">Login</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Explore</a></li>
                <li class="nav-item"><a class="nav-link" href="#">My Lists</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Challenges</a></li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
