spring.application.name=bookverse

# Database Connection (Adjust database name, username, and password to match your local setup)
spring.datasource.url=jdbc:mysql://localhost:3306/bookverse_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialectspring.application.name=demo
